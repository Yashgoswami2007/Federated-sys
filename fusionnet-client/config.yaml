model:
  # Federation-wide model — ALL nodes must use this exact model ID.
  # TinyLlama-1.1B: ~2.5 GB in FP32, runs on any CPU-only office PC.
  # Shares the Llama architecture so all AFLoRA/aggregation code works unchanged.
  # Do NOT change per-device — a different architecture breaks FedAvg aggregation.
  name: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
  quantization_type: "nf4"

federation:
  lora_rank: 8 # Will be overridden by device profile auto-detection
  learning_rate: 0.0001
  local_epochs: 1
  batch_size: 4
  aggregation_frequency: 1 # Epochs before syncing
  target_modules: ["q_proj", "v_proj"] # Configurable injection scope
  hub:
    repo_id: "yash-goswami/fusionnet-coordinator"
    repo_type: "dataset"

dataset:
  name: "banking77" # Default PoC dataset
  text_column: "text"
  label_column: "label"

privacy:
  use_dp_sgd: true
  epsilon: 1.0
  delta: 0.00001
  max_grad_norm: 1.0

device_profiles:
  MI300X:
    rank: 64
    batch_size: 32
  RX_7900_XTX:
    rank: 32
    batch_size: 16
  Steam_Deck:
    rank: 8
    batch_size: 4
  CPU_only:
    rank: 4
    batch_size: 2
